<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999">
  @for (toast of toasts; track toast.id) {
    <div class="toast show" [ngClass]="getToastClass(toast.type)" role="alert" aria-live="assertive" aria-atomic="true">
      <div class="toast-header" [ngClass]="getToastClass(toast.type)">
        <i class="ti {{ getToastIcon(toast.type) }} icon me-2"></i>
        <strong class="me-auto">{{ toast.title }}</strong>
        <button type="button" class="btn-close btn-close-white" (click)="removeToast(toast.id)" aria-label="Close"></button>
      </div>
      <div class="toast-body">{{ toast.message }}</div>
    </div>
  }
</div>
