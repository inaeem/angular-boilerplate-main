<div class="page page-center">
  <div class="container container-tight py-4">
    <div class="text-center mb-4">
      <a href="." class="navbar-brand navbar-brand-autodark">
        <img src="images/placeholder.png" height="36" alt="Logo" />
      </a>
    </div>
    <div class="card card-md">
      <div class="card-body">
        <h2 class="h2 text-center mb-4" translate>Login to your account</h2>
        @if (isLoading) {
          <div class="text-center">
            <div class="spinner-border text-primary" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p class="text-muted mt-2" translate>Logging in...</p>
          </div>
        } @else {
          <form (ngSubmit)="login()">
            <div class="mb-3">
              <label class="form-label" translate>Username</label>
              <input
                type="text"
                class="form-control"
                [(ngModel)]="username"
                name="username"
                placeholder="{{ 'Enter any username' | translate }}"
                autocomplete="username"
              />
              <small class="form-hint">Enter any username (e.g., 'demo')</small>
            </div>
            <div class="mb-2">
              <label class="form-label" translate>
                Password
              </label>
              <input
                type="password"
                class="form-control"
                [(ngModel)]="password"
                name="password"
                placeholder="{{ 'Enter any password' | translate }}"
                autocomplete="current-password"
              />
              <small class="form-hint">Enter any password</small>
            </div>
            <div class="mb-2">
              <label class="form-check">
                <input type="checkbox" class="form-check-input" checked />
                <span class="form-check-label" translate>Remember me on this device</span>
              </label>
            </div>
            <div class="form-footer">
              <button type="submit" class="btn btn-primary w-100">
                <i class="ti ti-login icon"></i>
                {{ 'Sign in' | translate }}
              </button>
            </div>
          </form>
        }
      </div>
      <div class="card-footer text-center py-3">
        <div class="text-muted">
          <small translate>Demo mode: Use any username and password to login</small>
        </div>
      </div>
    </div>
    <div class="text-center mt-3">
      <app-language-selector [openAbove]="true"></app-language-selector>
    </div>
  </div>
</div>
