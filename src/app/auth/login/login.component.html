<div class="page page-center">
  <div class="container container-normal py-5">
    <!-- Language Selector - Top Right -->
    <div class="d-flex justify-content-end mb-3">
      <app-language-selector></app-language-selector>
    </div>

    <!-- Header -->
    <div class="text-center mb-5">
      <h1 class="mb-2" translate>login.welcome</h1>
      <p class="text-muted" translate>login.subtitle</p>
    </div>

    <!-- Login Options -->
    <div class="row row-cards">
      <!-- Portal 1: Admin Portal -->
      <div class="col-lg-4 col-md-6">
        <div class="card login-portal-card">
          <div class="card-body text-center">
            <div class="login-portal-icon mb-3">
              <i class="ti ti-shield-lock"></i>
            </div>
            <h3 class="card-title mb-2" translate>login.admin.title</h3>
            <p class="text-muted mb-4" translate>login.admin.description</p>
            <div class="mt-auto">
              <button
                type="button"
                class="btn btn-primary w-100"
                (click)="login('admin')"
                [disabled]="isLoading">
                <i class="ti ti-login icon"></i>
                <span *ngIf="!isLoading || selectedPortal !== 'admin'" translate>login.admin.button</span>
                <span *ngIf="isLoading && selectedPortal === 'admin'">
                  <span class="spinner-border spinner-border-sm me-2"></span>
                  <span translate>login.loading</span>
                </span>
              </button>
            </div>
          </div>
          <div class="card-footer">
            <div class="text-muted small">
              <i class="ti ti-info-circle icon-inline"></i>
              <span translate>login.admin.footer</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Portal 2: Provider Portal -->
      <div class="col-lg-4 col-md-6">
        <div class="card login-portal-card">
          <div class="card-body text-center">
            <div class="login-portal-icon mb-3">
              <i class="ti ti-building"></i>
            </div>
            <h3 class="card-title mb-2" translate>login.provider.title</h3>
            <p class="text-muted mb-4" translate>login.provider.description</p>
            <div class="mt-auto">
              <button
                type="button"
                class="btn btn-primary w-100"
                (click)="login('provider')"
                [disabled]="isLoading">
                <i class="ti ti-login icon"></i>
                <span *ngIf="!isLoading || selectedPortal !== 'provider'" translate>login.provider.button</span>
                <span *ngIf="isLoading && selectedPortal === 'provider'">
                  <span class="spinner-border spinner-border-sm me-2"></span>
                  <span translate>login.loading</span>
                </span>
              </button>
            </div>
          </div>
          <div class="card-footer">
            <div class="text-muted small">
              <i class="ti ti-info-circle icon-inline"></i>
              <span translate>login.provider.footer</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Portal 3: Developer Portal -->
      <div class="col-lg-4 col-md-6">
        <div class="card login-portal-card">
          <div class="card-body text-center">
            <div class="login-portal-icon mb-3">
              <i class="ti ti-code"></i>
            </div>
            <h3 class="card-title mb-2" translate>login.developer.title</h3>
            <p class="text-muted mb-4" translate>login.developer.description</p>
            <div class="mt-auto">
              <button
                type="button"
                class="btn btn-primary w-100"
                (click)="login('developer')"
                [disabled]="isLoading">
                <i class="ti ti-login icon"></i>
                <span *ngIf="!isLoading || selectedPortal !== 'developer'" translate>login.developer.button</span>
                <span *ngIf="isLoading && selectedPortal === 'developer'">
                  <span class="spinner-border spinner-border-sm me-2"></span>
                  <span translate>login.loading</span>
                </span>
              </button>
            </div>
          </div>
          <div class="card-footer">
            <div class="text-muted small">
              <i class="ti ti-info-circle icon-inline"></i>
              <span translate>login.developer.footer</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
